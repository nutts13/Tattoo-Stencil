<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stencil AI Studio</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,sans-serif;
}

header {
  padding:20px;
  border-bottom:1px solid #222;
  text-align:center;
  font-weight:bold;
}

main {
  max-width:650px;
  margin:auto;
  padding:20px;
}

.drop {
  background:#111;
  border:2px dashed #333;
  padding:50px;
  text-align:center;
  border-radius:20px;
  cursor:pointer;
}

#output {
  margin-top:20px;
  background:#fff;
  border-radius:20px;
  min-height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#output img {
  width:100%;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.print { background:#fff; color:#000; }
.save { background:#2ecc71; color:#000; }
.copy { background:#3498db; color:#fff; }
.reset { background:#333; color:#fff; }

.loading {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<header>STENCIL AI STUDIO</header>

<main>

<div class="drop" onclick="fileInput.click()">
  <input type="file" id="fileInput" hidden accept="image/*">
  UPLOAD IMAGE
</div>

<div id="output"></div>

<button class="print" onclick="window.print()">PRINT</button>
<button class="save" onclick="saveImage()">SAVE IMAGE</button>
<button class="copy" onclick="copyImage()">COPY IMAGE</button>
<button class="reset" onclick="location.reload()">NEW IMAGE</button>

</main>

<div class="loading" id="loader">
  <p>Generating stencil...</p>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const loader = document.getElementById("loader");

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => generateStencil(ev.target.result);
  reader.readAsDataURL(file);
};

async function generateStencil(imageBase64) {
  loader.style.display = "flex";

  try {
    // STEP 1: Build strong stencil prompt
    const prompt = `
tattoo stencil, black ink, clean outline, no shading,
high contrast, line art, face structure, professional tattoo stencil
`;

    // STEP 2: Send to Stable Diffusion (Pollinations)
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

    const img = new Image();
    img.src = url + "&width=1024&height=1024&seed=" + Math.random();

    img.onload = () => {
      output.innerHTML = "";
      output.appendChild(img);
      loader.style.display = "none";
    };

    img.onerror = () => {
      throw new Error("Image generation failed");
    };

  } catch (err) {
    loader.style.display = "none";
    alert(err.message);
  }
}

/* SAVE */
function saveImage() {
  const img = document.querySelector("#output img");
  if (!img) return alert("No image");

  const a = document.createElement("a");
  a.href = img.src;
  a.download = "stencil.png";
  a.click();
}

/* COPY */
async function copyImage() {
  const img = document.querySelector("#output img");
  if (!img) return;

  try {
    const res = await fetch(img.src);
    const blob = await res.blob();

    await navigator.clipboard.write([
      new ClipboardItem({ [blob.type]: blob })
    ]);

    alert("Copied");
  } catch {
    alert("Copy failed (browser limitation)");
  }
}
</script>

</body>
</html>
