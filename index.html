<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stencil Studio Pro | Direct AI</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; }
  header { padding:20px; display:flex; justify-content:space-between; border-bottom:1px solid #222; align-items: center; }
  input[type="password"] { background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:10px; width:200px; }
  main { max-width:650px; margin:auto; padding:20px; }
  .drop { background:#111; border:2px dashed #333; padding:50px; text-align:center; border-radius:20px; cursor:pointer; font-weight: bold; }
  #resultContainer { margin-top: 20px; background: #fff; border-radius: 20px; overflow: hidden; display: none; line-height: 0; }
  #stencilImage { width:100%; height: auto; display: block; }
  .controls { margin-top:15px; }
  button { width:100%; padding:15px; margin-top:10px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
  .print { background:#fff; color:#000; }
  .save { background:#2ecc71; color:#000; }
  .copy { background:#3498db; color:#fff; }
  .reset { background:#333; color:#fff; }
  .loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; flex-direction:column; z-index: 100; }
  .spinner { width:30px; height:30px; border:3px solid #333; border-top:3px solid #fff; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<body>

<header>
  <div><b>STENCIL PRO</b> <small style="color:#666; margin-left:10px;">MASTER PROTOCOL V7</small></div>
  <input type="password" id="apiKey" placeholder="Gemini API Key">
</header>

<main>
  <div class="drop" id="dropZone" onclick="fileInput.click()">
    UPLOAD FOR DIRECT TRACE
    <input type="file" id="fileInput" hidden accept="image/*">
  </div>

  <div id="resultContainer">
    <img id="stencilImage" src="">
  </div>

  <div class="controls" id="actionButtons" style="display:none;">
    <button class="print" onclick="window.print()">PRINT STENCIL</button>
    <button class="save" onclick="saveImage()">SAVE COPY</button>
    <button class="copy" onclick="copyImage()">COPY IMAGE</button>
    <button class="reset" onclick="location.reload()">NEW IMAGE</button>
  </div>
</main>

<div class="loading" id="loader">
  <div class="spinner"></div>
  <p style="margin-top:15px;">Nano Banana is Blueprinting...</p>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const apiKey = document.getElementById("apiKey");
const stencilImage = document.getElementById("stencilImage");
const loader = document.getElementById("loader");

if (localStorage.geminiKey) apiKey.value = localStorage.geminiKey;
apiKey.oninput = () => localStorage.geminiKey = apiKey.value;

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file || !apiKey.value) return alert("Add image + API key");
  const reader = new FileReader();
  reader.onload = async ev => { await processImage(ev.target.result); };
  reader.readAsDataURL(file);
};

async function processImage(imgBase64) {
  loader.style.display = "flex";
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${apiKey.value}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[
              { inlineData: { mimeType: "image/jpeg", data: imgBase64.split(",")[1] } },
              { text: "STENCIL PROTOCOL: Generate a professional tattoo stencil. Solid black outlines for anatomical structures. Topographic mapping using dotted lines for shadow transitions and volume. Single-direction hatching for texture. White background, high-contrast black ink ONLY. Return as IMAGE." }
            ]
          }],
          generationConfig: { responseModalities: ["IMAGE"] }
        })
      }
    );

    const data = await res.json();
    const imageData = data.candidates[0].content.parts.find(p => p.inlineData).inlineData.data;
    
    stencilImage.src = `data:image/png;base64,${imageData}`;
    document.getElementById("dropZone").style.display = "none";
    document.getElementById("resultContainer").style.display = "block";
    document.getElementById("actionButtons").style.display = "block";
    
  } catch (err) {
    alert("Protocol Failed. Ensure API key is correct and multimodal is enabled.");
  } finally {
    loader.style.display = "none";
  }
}

function saveImage() {
  const link = document.createElement("a");
  link.download = "master-stencil.png";
  link.href = stencilImage.src;
  link.click();
}

async function copyImage() {
  const blob = await (await fetch(stencilImage.src)).blob();
  try {
    await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    alert("Copied to clipboard");
  } catch {
    saveImage();
    alert("Clipboard not supported - downloaded instead");
  }
}
</script>

</body>
</html>
