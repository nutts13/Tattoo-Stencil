<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stencil Pro Elite</title>

<style>
:root { --bg:#000; --ui:#1a1a1a; }

body {
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system, sans-serif;
}

header {
  padding:1.5rem;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
}

.api-input {
  background:#222;
  border:1px solid #444;
  border-radius:20px;
  color:#fff;
  padding:8px 15px;
  font-size:11px;
  width:200px;
}

main {
  max-width:600px;
  margin:auto;
  padding:20px;
}

.drop-zone {
  background:var(--ui);
  border:2px dashed #444;
  border-radius:20px;
  padding:60px 20px;
  text-align:center;
  cursor:pointer;
}

#output {
  background:#fff;
  border-radius:20px;
  margin-top:20px;
  min-height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#output img {
  width:100%;
}

.loading {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.spinner {
  width:30px;
  height:30px;
  border:3px solid #333;
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.btn {
  width:100%;
  padding:18px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-weight:800;
  cursor:pointer;
  display:none;
}

.print { background:#fff; color:#000; }
.reset { background:#333; color:#fff; }
</style>
</head>

<body>

<header>
  <div style="font-weight:900;letter-spacing:2px;">STENCIL ELITE</div>
  <input type="password" id="apiKey" class="api-input" placeholder="API Key">
</header>

<main>

<div class="drop-zone" onclick="fileIn.click()">
  <input type="file" id="fileIn" hidden accept="image/*">
  <div style="color:#aaa;font-weight:bold;">UPLOAD IMAGE</div>
</div>

<div id="output"></div>

<button class="btn print" onclick="window.print()">PRINT STENCIL</button>
<button class="btn reset" onclick="location.reload()">NEW IMAGE</button>

</main>

<div class="loading" id="loader">
  <div class="spinner"></div>
  <p>Generating stencil...</p>
</div>

<script>
const fileIn = document.getElementById('fileIn');
const apiKeyInput = document.getElementById('apiKey');

if (localStorage.getItem('key'))
  apiKeyInput.value = localStorage.getItem('key');

apiKeyInput.oninput = () =>
  localStorage.setItem('key', apiKeyInput.value);

fileIn.onchange = e => {
  const file = e.target.files[0];
  if (!file || !apiKeyInput.value)
    return alert("Add API key + image");

  const reader = new FileReader();
  reader.onload = async f => {
    const base64 = f.target.result.split(',')[1];
    generateStencil(base64);
  };
  reader.readAsDataURL(file);
};

async function generateStencil(b64) {
  loader.style.display = "flex";

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${apiKeyInput.value}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              {
                inlineData: {
                  mimeType: "image/jpeg",
                  data: b64
                }
              },
              {
                text: `
Convert this image into a tattoo stencil.

Rules:
- Black lines only
- White background
- No shading or grey
- Clean crisp outlines
- Focus on facial structure

Return only the image.
`
              }
            ]
          }]
        })
      }
    );

    const data = await res.json();

    const part = data?.candidates?.[0]?.content?.parts?.[0];

    if (!part?.inlineData) throw new Error("No image returned");

    const img = document.createElement("img");
    img.src = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;

    output.innerHTML = "";
    output.appendChild(img);

    document.querySelector(".drop-zone").style.display = "none";
    document.querySelector(".print").style.display = "block";
    document.querySelector(".reset").style.display = "block";

  } catch (err) {
    alert("Failed: " + err.message);
  }

  loader.style.display = "none";
}
</script>

</body>
</html>
