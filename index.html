<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stencil Studio</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,sans-serif;
}

main {
  max-width:650px;
  margin:auto;
  padding:20px;
}

.drop {
  background:#111;
  border:2px dashed #333;
  padding:50px;
  text-align:center;
  border-radius:20px;
  cursor:pointer;
}

canvas {
  width:100%;
  margin-top:20px;
  background:#fff;
  border-radius:20px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.print { background:#fff; color:#000; }
.save { background:#2ecc71; color:#000; }
.copy { background:#3498db; color:#fff; }
.reset { background:#333; color:#fff; }

.slider {
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<main>

<div class="drop" onclick="fileInput.click()">
  <input type="file" id="fileInput" hidden accept="image/*">
  UPLOAD IMAGE
</div>

<label>Line Strength</label>
<input type="range" id="strength" min="10" max="100" value="40" class="slider">

<canvas id="canvas"></canvas>

<button class="print" onclick="window.print()">PRINT</button>
<button class="save" onclick="saveImage()">SAVE IMAGE</button>
<button class="copy" onclick="copyImage()">COPY IMAGE</button>
<button class="reset" onclick="location.reload()">NEW IMAGE</button>

</main>

<script>
const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const strength = document.getElementById("strength");

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => loadImage(ev.target.result);
  reader.readAsDataURL(file);
};

function loadImage(src) {
  const img = new Image();
  img.src = src;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);
    applyEdgeStencil();
  };
}

function applyEdgeStencil() {
  const w = canvas.width;
  const h = canvas.height;

  let imgData = ctx.getImageData(0,0,w,h);
  let data = imgData.data;

  let output = ctx.createImageData(w,h);
  let out = output.data;

  const threshold = strength.value;

  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {

      let i = (y*w + x)*4;

      let gx =
        -getGray(x-1,y-1,w,data) -2*getGray(x-1,y,w,data) -getGray(x-1,y+1,w,data) +
         getGray(x+1,y-1,w,data) +2*getGray(x+1,y,w,data) +getGray(x+1,y+1,w,data);

      let gy =
        -getGray(x-1,y-1,w,data) -2*getGray(x,y-1,w,data) -getGray(x+1,y-1,w,data) +
         getGray(x-1,y+1,w,data) +2*getGray(x,y+1,w,data) +getGray(x+1,y+1,w,data);

      let mag = Math.sqrt(gx*gx + gy*gy);

      let val = mag > threshold ? 0 : 255;

      out[i] = out[i+1] = out[i+2] = val;
      out[i+3] = 255;
    }
  }

  ctx.putImageData(output,0,0);
}

function getGray(x,y,w,data){
  let i = (y*w + x)*4;
  return (data[i]+data[i+1]+data[i+2])/3;
}

/* SAVE */
function saveImage() {
  const a = document.createElement("a");
  a.download = "stencil.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

/* COPY */
async function copyImage() {
  try {
    const blob = await new Promise(r => canvas.toBlob(r));
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": blob })
    ]);
    alert("Copied");
  } catch {
    const a = document.createElement("a");
    a.download = "stencil.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
    alert("Downloaded instead");
  }
}
</script>

</body>
</html>
