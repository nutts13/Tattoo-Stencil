<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stencil Pro 2026</title>
<style>
  :root { --bg: #fdfcfb; --text: #1a1a1a; --border: #e8e4de; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; margin: 0; padding: 0; }
  header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top:0; z-index:10; }
  .api-box { font-size: 12px; padding: 8px; border: 1px solid var(--border); border-radius: 20px; width: 180px; }
  main { max-width: 600px; margin: 0 auto; padding: 20px; }
  .upload-area { border: 2px dashed #ccc; border-radius: 15px; padding: 40px 20px; text-align: center; cursor: pointer; background: #fff; transition: 0.3s; }
  .upload-area:active { transform: scale(0.98); background: #fafafa; }
  #fileIn { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #svgOut { background: #fff; border: 1px solid var(--border); border-radius: 15px; margin-top: 20px; min-height: 300px; display: flex; align-items: center; justify-content: center; }
  #svgOut svg { width: 100%; height: auto; display: block; }
  .btn-row { display: none; gap: 10px; margin-top: 15px; }
  button { flex: 1; padding: 15px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: bold; }
  .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div style="font-weight: 800; letter-spacing: 1px;">STENCIL PRO</div>
  <input type="password" id="key" class="api-box" placeholder="Gemini Key">
</header>

<main>
  <div class="upload-area" id="dropZone">
    <input type="file" id="fileIn" accept="image/*">
    <div style="font-weight: 600; color: #666;">✦ TAP TO UPLOAD PHOTO</div>
  </div>

  <div id="svgOut"></div>

  <div class="btn-row" id="btns">
    <button onclick="window.print()">PRINT</button>
    <button style="background: #eee; color: #000;" onclick="location.reload()">NEW</button>
  </div>
</main>

<div class="loading" id="loader">
  <div class="spinner"></div>
  <p style="margin-top: 15px; font-weight: 600;">TRACING LINES...</p>
</div>

<script>
  const keyField = document.getElementById('key');
  if (localStorage.getItem('saved_key')) keyField.value = localStorage.getItem('saved_key');
  keyField.oninput = () => localStorage.setItem('saved_key', keyField.value);

  document.getElementById('fileIn').onchange = (e) => {
    const file = e.target.files[0];
    if (!file || !keyField.value) return alert("Please enter your API key first!");
    
    document.getElementById('loader').style.display = 'flex';
    const reader = new FileReader();
    reader.onload = async (f) => {
      const b64 = f.target.result.split(',')[1];
      await getStencil(b64);
    };
    reader.readAsDataURL(file);
  };

  async function getStencil(b64) {
    const key = keyField.value;
    // Updated to 2.5 Flash for 2026 stability
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

    const body = {
      contents: [{
        parts: [
          { inline_data: { mime_type: "image/jpeg", data: b64 } },
          { text: "Generate a raw <svg> element that is a high-contrast black and white tattoo stencil of this person's face. Outlines only. No background. No shading. Return ONLY the svg code." }
        ]
      }],
      // THE FIX: These settings stop the AI from "blocking" portraits
      safetySettings: [
        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
      ]
    };

    try {
      const resp = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
      const data = await resp.json();

      // Better error handling so you don't just see "undefined"
      if (data.promptFeedback && data.promptFeedback.blockReason) {
        throw new Error("Google blocked this image: " + data.promptFeedback.blockReason);
      }

      if (!data.candidates || data.candidates.length === 0) {
        throw new Error("Safety Block: The AI refused to trace this face. Try a clearer photo.");
      }

      const text = data.candidates[0].content.parts[0].text;
      const svg = text.match(/<svg[\s\S]*?<\/svg>/);

      if (svg) {
        document.getElementById('svgOut').innerHTML = svg[0];
        document.getElementById('dropZone').style.display = 'none';
        document.getElementById('btns').style.display = 'flex';
      } else {
        throw new Error("AI returned text but no stencil. Try again.");
      }
    } catch (err) {
      alert("Error: " + err.message);
    } finally {
      document.getElementById('loader').style.display = 'none';
    }
  }
</script>

</body>
</html>
