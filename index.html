<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Master Protocol Studio</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { padding:20px; display:flex; justify-content:space-between; border-bottom:1px solid #222; align-items: center; }
  input[type="password"] { background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:10px; width:220px; font-size: 11px; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; position: relative; }
  .drop { background:#111; border:2px dashed #333; padding:60px 20px; text-align:center; border-radius:20px; cursor:pointer; width: 100%; max-width: 400px; }
  #canvas { max-width:100%; max-height:100%; border-radius:10px; display:none; background:#fff; cursor: crosshair; }
  .footer { background: #111; padding: 20px; border-top: 1px solid #222; display: none; flex-direction: column; gap: 10px; }
  .btn-row { display: flex; gap: 10px; }
  button { flex: 1; padding:16px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size: 14px; }
  .primary { background:#fff; color:#000; }
  .secondary { background:#333; color:#fff; }
  .loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; flex-direction:column; z-index: 100; }
  .spin { width:30px; height:30px; border:3px solid #333; border-top:3px solid #fff; border-radius:50%; animation:s 0.8s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div style="font-weight: 900; letter-spacing: 1px;">MASTER PROTOCOL</div>
  <input type="password" id="key" placeholder="Paste Default API Key">
</header>

<main>
  <div class="loading" id="loader">
    <div class="spin"></div>
    <p style="margin-top:15px; font-weight: bold; color: #fff;">BLUEPRINTING...</p>
  </div>
  <div class="drop" id="drop" onclick="fIn.click()">✦ UPLOAD REFERENCE<input type="file" id="fIn" hidden accept="image/*"></div>
  <canvas id="canvas"></canvas>
</main>

<div class="footer" id="footer">
  <div class="btn-row">
    <button class="primary" onclick="save()">SAVE PNG</button>
    <button class="primary" onclick="copy()">COPY</button>
  </div>
  <div class="btn-row">
    <button class="secondary" onclick="window.print()">PRINT</button>
    <button class="secondary" onclick="location.reload()">NEW IMAGE</button>
  </div>
</div>

<script>
const fIn = document.getElementById("fIn");
const key = document.getElementById("key");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const loader = document.getElementById("loader");

if (localStorage.mpKeyV10) key.value = localStorage.mpKeyV10;
key.oninput = () => localStorage.mpKeyV10 = key.value;

fIn.onchange = e => {
  const file = e.target.files[0];
  if (!file || !key.value) return alert("Key Required");
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => { await runProtocol(reader.result.split(",")[1]); };
};

async function runProtocol(b64) {
  loader.style.display = "flex";
  // Using Flash 2.0 - Bypasses the 3.1 "Image Blocking" for Free Keys
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key.value}`;

  const body = {
    contents:[{
      parts:[
        { inlineData: { mimeType: "image/jpeg", data: b64 } },
        { text: "STENCIL PROTOCOL: Analyze this image. Return ONLY a JSON array of coordinate paths to draw a tattoo stencil. 1. Solid paths for main anatomical structures. 2. Dotted paths for topographic shadow mapping. 3. Fine hatching paths for volume. format: [[{x:0,y:0},...]]" }
      ]
    }]
  };

  try {
    const response = await fetch(url, { method: "POST", body: JSON.stringify(body) });
    const data = await response.json();
    const paths = JSON.parse(data.candidates[0].content.parts[0].text.match(/\[[\s\S]*\]/)[0]);
    
    renderProtocol(paths);
  } catch (err) {
    alert("Protocol Error: Try a clearer photo.");
  } finally {
    loader.style.display = "none";
  }
}

function renderProtocol(paths) {
  canvas.width = 2000; canvas.height = 2000; // High res for printing
  ctx.fillStyle = "white"; ctx.fillRect(0,0,2000,2000);
  ctx.strokeStyle = "black"; ctx.lineWidth = 3;
  
  paths.forEach((path, i) => {
    ctx.beginPath();
    if(i % 3 === 0) ctx.setLineDash([2, 8]); // Topographic Dots
    else ctx.setLineDash([]); // Solid Lines
    
    path.forEach((p, index) => {
      const x = p.x * 20; const y = p.y * 20; // Scale to canvas
      if(index === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  canvas.style.display = "block";
  document.getElementById("drop").style.display = "none";
  document.getElementById("footer").style.display = "flex";
}

function save() { const a = document.createElement("a"); a.download = "master-stencil.png"; a.href = canvas.toDataURL(); a.click(); }
async function copy() { 
  const blob = await new Promise(res => canvas.toBlob(res));
  try { await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]); alert("Copied!"); } catch { save(); }
}
</script>
</body>
</html>
