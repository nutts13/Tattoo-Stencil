<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Master Protocol Studio</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
  header { padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; }
  input[type="password"] { background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:10px; width:180px; font-size:11px; }
  main { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; position:relative; }
  .drop { background:#111; border:2px dashed #444; padding:50px 20px; text-align:center; border-radius:20px; cursor:pointer; width:100%; max-width:400px; font-weight:bold; }
  #stencil { max-width:100%; max-height:100%; border-radius:10px; display:none; background:#fff; image-rendering: pixelated; }
  .footer { background:#111; padding:20px; border-top:1px solid #222; display:none; flex-direction:column; gap:10px; }
  .btn-row { display:flex; gap:10px; }
  button { flex:1; padding:16px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
  .white { background:#fff; color:#000; }
  .dark { background:#333; color:#fff; }
  .loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:100; flex-direction:column; }
  .spin { width:30px; height:30px; border:3px solid #333; border-top:3px solid #fff; border-radius:50%; animation:s 0.8s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div style="font-weight:900; letter-spacing:1px; font-size:14px;">MASTER PROTOCOL V12</div>
  <input type="password" id="key" placeholder="Gemini API Key">
</header>

<main>
  <div class="loader" id="load"><div class="spin"></div><p style="margin-top:15px;">Tracing Blueprint...</p></div>
  <div class="drop" id="drop" onclick="f.click()">✦ UPLOAD REFERENCE<input type="file" id="f" hidden accept="image/*"></div>
  <img id="stencil" src="">
</main>

<div class="footer" id="foot">
  <div class="btn-row"><button class="white" onclick="save()">SAVE PNG</button><button class="white" onclick="copy()">COPY</button></div>
  <div class="btn-row"><button class="dark" onclick="window.print()">PRINT</button><button class="dark" onclick="location.reload()">NEW</button></div>
</div>

<script>
const key = document.getElementById("key");
const res = document.getElementById("stencil");
const f = document.getElementById("f");

if (localStorage.mpKeyV12) key.value = localStorage.mpKeyV12;
key.oninput = () => localStorage.mpKeyV12 = key.value;

f.onchange = e => {
  const file = e.target.files[0];
  if (!file || !key.value) return alert("Key + Image Required");
  const r = new FileReader();
  r.readAsDataURL(file);
  r.onload = async () => { await run(r.result.split(",")[1]); };
};

async function run(b64) {
  document.getElementById("load").style.display = "flex";
  // Using gemini-1.5-flash: It has the highest success rate for free tier data strings
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key.value}`;

  const body = {
    contents:[{
      parts:[
        { inlineData: { mimeType: "image/jpeg", data: b64 } },
        { text: "STENCIL PROTOCOL: You are a technical tattoo stencil artist. Recreate this image as a high-contrast blueprint. 1. Solid black anatomy lines. 2. Dotted topographical maps for shadow transitions. 3. Hatching for volume. Output: Provide ONLY the Base64 data string of a 1024x1024 black and white PNG. No markdown, no text. Just the raw string." }
      ]
    }]
  };

  try {
    const response = await fetch(url, { method: "POST", body: JSON.stringify(body) });
    const data = await response.json();
    let str = data.candidates[0].content.parts[0].text.trim();
    
    // Cleanup: Remove any "data:image" prefix or backticks if AI added them
    str = str.replace(/^data:image\/[a-z]+;base64,/, "").replace(/```/g, "").replace(/base64/g, "").trim();

    res.src = `data:image/png;base64,${str}`;
    res.style.display = "block";
    document.getElementById("drop").style.display = "none";
    document.getElementById("foot").style.display = "flex";
  } catch (err) {
    alert("Protocol Error: The model timed out. Try a slightly smaller photo.");
  } finally {
    document.getElementById("load").style.display = "none";
  }
}

function save() { const a = document.createElement("a"); a.download = "stencil.png"; a.href = res.src; a.click(); }
async function copy() { 
  const b = await (await fetch(res.src)).blob();
  try { await navigator.clipboard.write([new ClipboardItem({"image/png":b})]); alert("Copied!"); } catch { save(); }
}
</script>
</body>
</html>
