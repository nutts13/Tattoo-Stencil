<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stencil Pro</title>
<style>
  :root { --bg: #f8f7f4; --surface: #ffffff; --border: #e8e4de; --text: #1a1a1a; --accent: #000000; --radius: 12px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
  header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .api-input { font-size: 0.8rem; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 20px; width: 200px; outline: none; }
  main { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  .upload-zone { background: var(--surface); border: 2px dashed var(--border); border-radius: var(--radius); padding: 3rem; text-align: center; cursor: pointer; position: relative; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #svgContainer { background: white; border: 1px solid var(--border); border-radius: var(--radius); min-height: 400px; display: flex; align-items: center; justify-content: center; margin-top: 2rem; overflow: hidden; }
  #svgContainer svg { width: 100%; height: auto; max-height: 70vh; }
  .actions { display: flex; gap: 10px; margin-top: 1rem; display: none; }
  button { flex: 1; padding: 1rem; border-radius: var(--radius); border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
  .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; }
</style>
</head>
<body>

<header>
  <div style="font-weight:bold; letter-spacing:1px;">STENCIL PRO</div>
  <input type="password" id="apiKey" class="api-input" placeholder="Enter API Key">
</header>

<main>
  <div id="homeView">
    <div class="upload-zone">
      <input type="file" id="filePicker" accept="image/*">
      <div>✦ Tap to Upload Portrait</div>
    </div>
  </div>

  <div id="svgContainer"></div>
  
  <div class="actions" id="actionArea">
    <button onclick="window.print()">Print Stencil</button>
    <button style="background:#eee; color:#000;" onclick="location.reload()">New Stencil</button>
  </div>
</main>

<div class="loading" id="loader">
  <div class="spinner"></div>
  <p>Tracing Stencil...</p>
</div>

<script>
  const picker = document.getElementById('filePicker');
  const apiKeyInput = document.getElementById('apiKey');

  // Load saved key
  if (localStorage.getItem('gem_key')) apiKeyInput.value = localStorage.getItem('gem_key');
  apiKeyInput.oninput = () => localStorage.setItem('gem_key', apiKeyInput.value);

  picker.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file || !apiKeyInput.value) return alert("Need both a photo and your API Key!");

    document.getElementById('loader').style.display = 'flex';
    
    const reader = new FileReader();
    reader.onload = async (f) => {
      const base64 = f.target.result.split(',')[1];
      await callGemini(base64);
    };
    reader.readAsDataURL(file);
  };

  async function callGemini(base64) {
    const key = apiKeyInput.value;
    // Using the 2026 stable Flash model
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;

    const payload = {
      contents: [{
        parts: [
          { inline_data: { mime_type: "image/jpeg", data: base64 } },
          { text: "Output ONLY a raw <svg> code block for a tattoo stencil of this face. Use black paths, no shading, no background. High contrast line art only." }
        ]
      }]
    };

    try {
      const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
      const data = await response.json();
      const code = data.candidates[0].content.parts[0].text;
      
      // Extract the SVG from the text response
      const svgMatch = code.match(/<svg[\s\S]*?<\/svg>/);
      if (svgMatch) {
        document.getElementById('svgContainer').innerHTML = svgMatch[0];
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('actionArea').style.display = 'flex';
      } else {
        alert("AI couldn't trace this. Try a clearer photo!");
      }
    } catch (err) {
      alert("Error: " + err.message);
    } finally {
      document.getElementById('loader').style.display = 'none';
    }
  }
</script>

</body>
</html>
