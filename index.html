<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stencil Studio Pro</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system, sans-serif;
}

header {
  padding:20px;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
}

input {
  background:#111;
  color:#fff;
  border:1px solid #333;
  padding:8px;
  border-radius:10px;
  width:200px;
}

main {
  max-width:650px;
  margin:auto;
  padding:20px;
}

.drop {
  background:#111;
  border:2px dashed #333;
  padding:50px;
  text-align:center;
  border-radius:20px;
  cursor:pointer;
}

canvas {
  width:100%;
  margin-top:20px;
  background:#fff;
  border-radius:20px;
}

.controls {
  margin-top:15px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.print { background:#fff; color:#000; }
.save { background:#2ecc71; color:#000; }
.copy { background:#3498db; color:#fff; }
.reset { background:#333; color:#fff; }

.slider { width:100%; }
</style>
</head>

<body>

<header>
  <div><b>STENCIL PRO</b></div>
  <input type="password" id="apiKey" placeholder="Gemini API Key">
</header>

<main>

<div class="drop" onclick="fileInput.click()">
  <input type="file" id="fileInput" hidden accept="image/*">
  UPLOAD IMAGE
</div>

<div class="controls">
  <label>Line Strength</label>
  <input type="range" id="strength" min="1" max="3" step="0.1" value="1.8">
</div>

<canvas id="canvas"></canvas>

<button class="print" onclick="window.print()">PRINT</button>
<button class="save" onclick="saveImage()">SAVE IMAGE</button>
<button class="copy" onclick="copyImage()">COPY IMAGE</button>
<button class="reset" onclick="location.reload()">NEW IMAGE</button>

</main>

<script>
const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const strength = document.getElementById("strength");

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => loadImage(ev.target.result);
  reader.readAsDataURL(file);
};

function loadImage(src) {
  const img = new Image();
  img.src = src;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    applyStencil();
  };
}

function applyStencil() {
  let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imgData.data;

  const threshold = strength.value * 120;

  for (let i=0;i<data.length;i+=4) {
    let avg = (data[i]+data[i+1]+data[i+2])/3;

    avg = avg > threshold ? 255 : 0;

    data[i]=data[i+1]=data[i+2]=avg;
  }

  ctx.putImageData(imgData,0,0);
}

/* -------------------
   SAVE + COPY
-------------------- */

function saveImage() {
  const a = document.createElement("a");
  a.download = "stencil.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

async function copyImage() {
  try {
    const blob = await new Promise(r => canvas.toBlob(r));
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": blob })
    ]);
    alert("Copied");
  } catch {
    const a = document.createElement("a");
    a.download = "stencil.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
    alert("Downloaded instead (clipboard not supported)");
  }
}
</script>

</body>
</html>
