<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Protocol Studio</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; }
  header { padding:20px; display:flex; justify-content:space-between; border-bottom:1px solid #222; align-items: center; }
  input[type="password"] { background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:10px; width:220px; font-size: 11px; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; position: relative; }
  .drop { background:#111; border:2px dashed #333; padding:60px 20px; text-align:center; border-radius:20px; cursor:pointer; width: 100%; max-width: 500px; }
  #stencilImage { max-width:100%; max-height:100%; border-radius:10px; display: none; background: #fff; }
  .footer-actions { background: #111; padding: 20px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
  .btn-row { display: flex; gap: 10px; }
  button { flex: 1; padding:16px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size: 14px; }
  .primary { background:#fff; color:#000; }
  .secondary { background:#333; color:#fff; }
  .loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; flex-direction:column; z-index: 100; }
  .spinner { width:30px; height:30px; border:3px solid #333; border-top:3px solid #fff; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<body>

<header>
  <div style="font-weight: 900; letter-spacing: 1px;">MASTER PROTOCOL V8</div>
  <input type="password" id="apiKey" placeholder="AIza... (Gemini Key)">
</header>

<main>
  <div class="loading" id="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight: bold;">Generating Blueprint...</p>
  </div>

  <div class="drop" id="dropZone" onclick="fileInput.click()">
    <div style="font-size: 24px; margin-bottom: 10px;">✦</div>
    <b>UPLOAD REFERENCE</b>
    <input type="file" id="fileInput" hidden accept="image/*">
  </div>

  <img id="stencilImage" src="">
</main>

<div class="footer-actions" id="actions" style="display:none;">
  <div class="btn-row">
    <button class="primary" onclick="saveImage()">SAVE COPY</button>
    <button class="primary" onclick="copyImage()">COPY</button>
  </div>
  <div class="btn-row">
    <button class="secondary" onclick="window.print()">PRINT</button>
    <button class="secondary" onclick="location.reload()">NEW IMAGE</button>
  </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const apiKey = document.getElementById("apiKey");
const stencilImage = document.getElementById("stencilImage");
const loader = document.getElementById("loader");

if (localStorage.geminiKeyV8) apiKey.value = localStorage.geminiKeyV8;
apiKey.oninput = () => localStorage.geminiKeyV8 = apiKey.value;

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file || !apiKey.value) return alert("Key + Image Required");
  const reader = new FileReader();
  reader.onload = async ev => { await runProtocol(ev.target.result); };
  reader.readAsDataURL(file);
};

async function runProtocol(imgBase64) {
  loader.style.display = "flex";
  
  // Using Gemini 2.0 Flash for maximum Free Tier stability
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey.value}`;

  const payload = {
    contents:[{
      parts:[
        { inlineData: { mimeType: "image/jpeg", data: imgBase64.split(",")[1] } },
        { text: "STENCIL PROTOCOL: Create a technical tattoo stencil. 1. Solid black lines for anatomical structures. 2. Topographic mapping using dotted lines for shadow transitions. 3. Single-direction hatching for volume. Output: White background, high-contrast black ink image ONLY. Return as IMAGE." }
      ]
    }],
    generationConfig: { 
      responseModalities: ["IMAGE"] 
    }
  };

  try {
    const res = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
    const data = await res.json();
    
    // Check if the model returned an image part
    const imgPart = data.candidates[0].content.parts.find(p => p.inlineData);
    
    if (imgPart) {
      stencilImage.src = `data:image/png;base64,${imgPart.inlineData.data}`;
      stencilImage.style.display = "block";
      document.getElementById("dropZone").style.display = "none";
      document.getElementById("actions").style.display = "flex";
    } else {
      throw new Error("Model did not return an image. Check API permissions.");
    }
  } catch (err) {
    alert("FAIL: The Free Tier key is blocking Image Output. Ensure 'Multimodal' is enabled in AI Studio settings.");
  } finally {
    loader.style.display = "none";
  }
}

function saveImage() {
  const link = document.createElement("a");
  link.download = "protocol-stencil.png";
  link.href = stencilImage.src;
  link.click();
}

async function copyImage() {
  const blob = await (await fetch(stencilImage.src)).blob();
  try {
    await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    alert("Copied!");
  } catch {
    saveImage();
  }
}
</script>

<style>
@media print {
  header, .footer-actions, .loading, .drop { display: none !important; }
  main { padding: 0 !important; background: #fff !important; }
  #stencilImage { width: 100% !important; max-height: none !important; display: block !important; }
}
</style>

</body>
</html>
