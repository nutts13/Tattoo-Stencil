<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stencil Studio</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,sans-serif;
}

main {
  max-width:650px;
  margin:auto;
  padding:20px;
}

.drop {
  background:#111;
  border:2px dashed #333;
  padding:50px;
  text-align:center;
  border-radius:20px;
  cursor:pointer;
}

#output {
  margin-top:20px;
  background:#fff;
  border-radius:20px;
  min-height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#output img {
  width:100%;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.print { background:#fff; color:#000; }
.save { background:#2ecc71; color:#000; }
.copy { background:#3498db; color:#fff; }
.reset { background:#333; color:#fff; }

.loading {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<main>

<div class="drop" onclick="fileInput.click()">
  <input type="file" id="fileInput" hidden accept="image/*">
  UPLOAD IMAGE
</div>

<div id="output"></div>

<button class="print" onclick="window.print()">PRINT</button>
<button class="save" onclick="saveImage()">SAVE IMAGE</button>
<button class="copy" onclick="copyImage()">COPY IMAGE</button>
<button class="reset" onclick="location.reload()">NEW IMAGE</button>

</main>

<div class="loading" id="loader">
  <p>Generating stencil (AI)...</p>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const loader = document.getElementById("loader");

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  generateStencil(file);
};

async function generateStencil(file) {
  loader.style.display = "flex";

  try {
    const formData = new FormData();
    formData.append("file", file);

    // FREE HuggingFace lineart model
    const response = await fetch(
      "https://api-inference.huggingface.co/models/lllyasviel/control_v11p_sd15_lineart",
      {
        method: "POST",
        body: file
      }
    );

    if (!response.ok) throw new Error("AI failed");

    const blob = await response.blob();

    const url = URL.createObjectURL(blob);

    const img = document.createElement("img");
    img.src = url;

    output.innerHTML = "";
    output.appendChild(img);

  } catch (err) {
    alert("Error: " + err.message);
  }

  loader.style.display = "none";
}

/* SAVE */
function saveImage() {
  const img = document.querySelector("#output img");
  if (!img) return;

  const a = document.createElement("a");
  a.href = img.src;
  a.download = "stencil.png";
  a.click();
}

/* COPY */
async function copyImage() {
  const img = document.querySelector("#output img");
  if (!img) return;

  try {
    const res = await fetch(img.src);
    const blob = await res.blob();

    await navigator.clipboard.write([
      new ClipboardItem({ [blob.type]: blob })
    ]);

    alert("Copied");
  } catch {
    alert("Copy failed");
  }
}
</script>

</body>
</html>
