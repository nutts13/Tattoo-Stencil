<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Master Protocol Studio</title>
<style>
  body { margin:0; background:#000; color:#fff; font-family:-apple-system, sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { padding:20px; display:flex; justify-content:space-between; border-bottom:1px solid #222; align-items:center; }
  input[type="password"] { background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:10px; width:180px; font-size:11px; }
  main { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; position:relative; overflow:hidden; }
  .drop { background:#111; border:2px dashed #444; padding:60px 20px; text-align:center; border-radius:20px; cursor:pointer; width:100%; max-width:400px; font-weight:bold; }
  #canvas { max-width:100%; max-height:100%; border-radius:10px; display:none; background:#fff; image-rendering: crisp-edges; }
  .footer { background:#111; padding:20px; border-top:1px solid #222; display:none; flex-direction:column; gap:10px; }
  .btn-row { display:flex; gap:10px; }
  button { flex:1; padding:16px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
  .white { background:#fff; color:#000; }
  .dark { background:#333; color:#fff; }
  .loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:100; flex-direction:column; }
  .spin { width:30px; height:30px; border:3px solid #333; border-top:3px solid #fff; border-radius:50%; animation:s 0.8s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div style="font-weight:900; letter-spacing:1px; font-size:14px;">MASTER PROTOCOL V14</div>
  <input type="password" id="key" placeholder="Paste API Key">
</header>

<main>
  <div class="loader" id="load"><div class="spin"></div><p style="margin-top:15px; font-weight:bold;">Tracing Blueprint...</p></div>
  <div class="drop" id="drop" onclick="f.click()">✦ UPLOAD REFERENCE<input type="file" id="f" hidden accept="image/*"></div>
  <canvas id="canvas"></canvas>
</main>

<div class="footer" id="foot">
  <div class="btn-row"><button class="white" onclick="save()">SAVE PNG</button><button class="white" onclick="copy()">COPY</button></div>
  <div class="btn-row"><button class="dark" onclick="window.print()">PRINT</button><button class="dark" onclick="location.reload()">NEW</button></div>
</div>

<script>
const key = document.getElementById("key");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const f = document.getElementById("f");

if (localStorage.mpKeyV14) key.value = localStorage.mpKeyV14;
key.oninput = () => localStorage.mpKeyV14 = key.value;

f.onchange = e => {
  const file = e.target.files[0];
  if (!file || !key.value) return alert("Key + Image Required");
  const r = new FileReader();
  r.readAsDataURL(file);
  r.onload = async () => { 
    const img = new Image();
    img.src = r.result;
    img.onload = () => runProtocol(r.result.split(",")[1], img.width, img.height);
  };
};

async function runProtocol(b64, w, h) {
  document.getElementById("load").style.display = "flex";
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key.value}`;

  const body = {
    contents:[{
      parts:[
        { inlineData: { mimeType: "image/jpeg", data: b64 } },
        { text: "MASTER PROTOCOL: Analyze image and return a JSON list of line paths. 1. SOLID: main anatomy. 2. DOTTED: shadow topography. 3. HATCH: dark volume. Format: [[{x,y},{x,y}]] where coords are 0-100." }
      ]
    }]
  };

  try {
    const response = await fetch(url, { method: "POST", body: JSON.stringify(body) });
    const data = await response.json();
    const txt = data.candidates[0].content.parts[0].text;
    const paths = JSON.parse(txt.match(/\[[\s\S]*\]/)[0]);
    
    // Setup Canvas for High Res Print
    canvas.width = 2000; 
    canvas.height = (h / w) * 2000;
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "black";
    ctx.lineWidth = 3;

    paths.forEach((path, i) => {
      ctx.beginPath();
      // Apply Master Protocol styles
      if (i % 3 === 1) ctx.setLineDash([2, 10]); // Dotted Topography
      else if (i % 3 === 2) ctx.setLineDash([5, 5]); // Hatching
      else ctx.setLineDash([]); // Solid Outlines

      path.forEach((p, idx) => {
        const x = (p.x / 100) * canvas.width;
        const y = (p.y / 100) * canvas.height;
        if (idx === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    });

    canvas.style.display = "block";
    document.getElementById("drop").style.display = "none";
    document.getElementById("foot").style.display = "flex";
  } catch (err) {
    alert("Protocol Error: The API key is likely restricted or the image is too complex. Try a simpler subject.");
  } finally {
    document.getElementById("load").style.display = "none";
  }
}

function save() { const a = document.createElement("a"); a.download = "stencil.png"; a.href = canvas.toDataURL(); a.click(); }
async function copy() { 
  const blob = await new Promise(res => canvas.toBlob(res));
  try { await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]); alert("Copied!"); } catch { save(); }
}
</script>
</body>
</html>
